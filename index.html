<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>PolyPet</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

<div class="sidebar">

<h2 class="logo">🦊 PolyPet</h2>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('learn')">Flashcards</button>
<button onclick="showPage('game')">Game</button>
<button onclick="showPage('test')">Unit Test</button>
<button onclick="showPage('schedule')">Scheduling</button>
<button onclick="showPage('pets')">Pet Collection</button>

</div>

<div class="main">

<!-- HOME -->

<div id="home" class="page active">

<h1 id="greeting"></h1>
<p id="encourage"></p>

<div class="grid">

<div class="card">
<h3>Level</h3>
<p id="level">1</p>
</div>

<div class="card">
<h3>XP</h3>
<div class="xp-bar"><div id="xp-fill"></div></div>
</div>

<div class="card">
<h3>Your Pet</h3>
<div class="pet-avatar">🦊</div>
</div>

</div>

</div>

<!-- FLASHCARDS -->

<div id="learn" class="page">

<h1>Flashcards</h1>

<div class="flashcard" onclick="flipCard()">

<div id="card-front">Hola</div>
<div id="card-back">Hello</div>

</div>

<button onclick="nextCard()">Next</button>

</div>

<!-- MATCH GAME -->

<div id="game" class="page">

<h1>Matching Game</h1>

<div id="match-board"></div>

</div>

<!-- TEST -->

<div id="test" class="page">

<h1>Unit Test</h1>

<div id="quiz-container"></div>

<button onclick="submitTest()">Submit Test</button>

<p id="score"></p>

</div>

<!-- SCHEDULING -->

<div id="schedule" class="page">

<h1>Session Scheduling</h1>

<div class="card">

<h3>Book Tutor or Group Session</h3>

<input id="session-name" placeholder="Tutor or Group Name">

<input id="session-date" type="date">

<input id="session-time" type="time">

<button onclick="addSession()">Schedule</button>

<ul id="session-list"></ul>

</div>

<div class="card">

<h3>Submit Excused Absence</h3>

<textarea id="absence-reason" placeholder="Reason"></textarea>

<button onclick="submitAbsence()">Submit</button>

<p id="absence-msg"></p>

</div>

<div class="card">

<h3>World Clock</h3>

<input id="country-input" placeholder="Enter Country">

<button onclick="addClock()">Add Clock</button>

<div id="clock-list"></div>

</div>

</div>

<!-- PET COLLECTION -->

<div id="pets" class="page">

<h1>Pet Collection</h1>

<div class="pet-grid">

<div class="pet-card">🐼 Chinese</div>
<div class="pet-card">🐱 Japanese</div>
<div class="pet-card">🐺 German</div>
<div class="pet-card">🦁 Swahili</div>

</div>

</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
