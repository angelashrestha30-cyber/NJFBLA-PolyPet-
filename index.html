<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>PolyPet</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="blob"></div>
<div class="blob2"></div>

<div id="fox">🦊</div>

<div class="dashboard">

<div class="sidebar">

<h2>🦊 PolyPet</h2>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('learn')">Learning</button>
<button onclick="showPage('flashcards')">Flashcards</button>
<button onclick="showPage('test')">Unit Test</button>
<button onclick="showPage('schedule')">Scheduling</button>
<button onclick="showPage('pets')">Pet Collection</button>

</div>

<div class="main">

<!-- HOME -->

<div id="home" class="page active">

<h1 id="greeting"></h1>
<p id="encourage"></p>

<div class="card">

<h3>🌍 World Clock</h3>

<div id="clock-list"></div>

</div>

</div>

<!-- LEARNING -->

<div id="learn" class="page">

<h1>Fill In The Blank Practice</h1>

<div id="practice"></div>

<button onclick="checkPractice()">Check Answers</button>

<p id="practice-result"></p>

</div>

<!-- FLASHCARDS -->

<div id="flashcards" class="page">

<h1>Flashcards</h1>

<div class="flashcard" onclick="flipCard()">

<div id="card-front"></div>
<div id="card-back"></div>

</div>

<button onclick="nextCard()">Next Card</button>

</div>

<!-- TEST -->

<div id="test" class="page">

<h1>Spanish Unit 1 Test</h1>

<div id="quiz"></div>

<button onclick="submitTest()">Submit Test</button>

<div id="results"></div>

</div>

<!-- SCHEDULING -->

<div id="schedule" class="page">

<h1>Schedule Sessions</h1>

<div class="card">

<input id="session-name" placeholder="Tutor or Group">
<input id="session-date" type="date">
<input id="session-time" type="time">

<button onclick="addSession()">Schedule</button>

<ul id="sessions"></ul>

</div>

<div class="card">

<h3>Submit Excused Absence</h3>

<textarea id="absence"></textarea>

<button onclick="submitAbsence()">Submit</button>

<p id="absence-msg"></p>

</div>

</div>

<!-- PET COLLECTION -->

<div id="pets" class="page">

<h1>Pet Collection</h1>

<div class="pet-grid">

<div class="pet-card">🐼<br>Chinese Panda</div>
<div class="pet-card">🐱<br>Japanese Cat</div>
<div class="pet-card">🐺<br>German Wolf</div>
<div class="pet-card">🦁<br>Swahili Lion</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
